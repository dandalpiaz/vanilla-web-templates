<main id="main" class="centered-page">

    <!--<div role="alert" class="yellow-alert">Sample page, forms do not function</div>-->

    <h1>Contact Us (template)</h1>

    <p>All fields marked with * are required.</p>

    <form action="">
        <label for="email">Email Address*</label>
        <input type="email" id="email" placeholder="jane.doe@gmail.com" required>

        <label for="subject">Subject*</label>
        <select id="subject" required>
            <!--<option value="" disabled selected>Select a subject</option>-->
            <option value="general">General Inquiry</option>
            <option value="support">Support</option>
            <option value="feedback">Feedback</option>
        </select>

        <label for="message">Your Message*</label>
        <textarea id="message" placeholder="Type your message here..." minlength="1" maxlength="2000" aria-describedby="helper3" required></textarea>
        <p id="helper3" class="helper-text">(2000 characters maximum)</p>

        <label for="attachment">Attachment</label>
        <input type="file" id="attachment">

        <label for="subscribe">Subscribe to our newsletter</label>
        <input type="checkbox" id="subscribe" checked>

        <button type="submit" style="width: 100%;">Send</button>
    </form>

</main>
